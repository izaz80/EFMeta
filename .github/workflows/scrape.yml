name: Scrape eFootballHub Players

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6am UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch cheerio

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Commit updated player data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/players.json
          git diff --cached --quiet || git commit -m "chore: update player data $(date -u '+%Y-%m-%d')"
          git push
